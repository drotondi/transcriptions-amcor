<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#FBFAF3;
  --bg-2:#F4F2E9;
  --card:#FFFFFE;
  --card-2:#F4F2E9;
  --ink:#0F0F0E;
  --ink-2:#3A3A38;
  --muted:#8C8B82;
  --line:#E8E5D6;
  --line-2:#D9D6C6;
  --accent:#C7E14B;
  --accent-deep:#A8C634;
  --label:#6B5BD3;
  --danger:#B5524A;
  --warn:#D4A93A;
  --ok:#7BAE3A;
  --serif:"Instrument Serif", ui-serif, Georgia, serif;
  --sans:"Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:400;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;color:inherit;background:none;border:0;cursor:pointer;font-size:14px}
input,select,textarea{font-family:inherit;font-size:14px;color:inherit;outline:none}
[contenteditable]{outline:none;cursor:text}
[contenteditable]:focus{background:#FFF9D6;border-radius:4px;box-shadow:0 0 0 4px #FFF9D6}
[contenteditable]:hover:not(:focus){background:rgba(0,0,0,.02);border-radius:4px}

/* shell */
.shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{padding:18px 32px;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:0;z-index:10}
.topbar-row{display:flex;align-items:center;justify-content:space-between;gap:24px}
.brand{display:flex;align-items:center;gap:8px;font-weight:600}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px rgba(199,225,75,.25)}
.topbar-right{display:flex;align-items:center;gap:14px}
.kbd-trigger{display:flex;align-items:center;gap:8px;border:1px solid var(--line);padding:6px 10px;border-radius:8px;color:var(--ink-2);background:var(--card)}
.kbd-trigger:hover{border-color:var(--line-2)}
.kbd-trigger .k{font-size:11px;color:var(--muted);border:1px solid var(--line);padding:1px 6px;border-radius:5px;background:var(--bg-2)}
.date{color:var(--muted);font-variant-numeric:tabular-nums;font-size:13px}
.tabs-top{display:flex;align-items:flex-end;gap:0;margin-top:14px;overflow-x:auto;scrollbar-width:none}
.tabs-top::-webkit-scrollbar{display:none}
.tabs-top a{padding:10px 18px;color:var(--muted);font-weight:500;font-size:14px;white-space:nowrap;border-bottom:2px solid transparent;cursor:pointer;transition:color .15s,border-color .15s}
.tabs-top a:hover{color:var(--ink-2)}
.tabs-top a.active{color:var(--ink);border-bottom-color:var(--accent);font-weight:600}
.muted{color:var(--muted)}

.view{padding:36px 32px 100px;max-width:1240px;width:100%;margin:0 auto}

/* hero */
.eyebrow{font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--label);font-weight:600;margin-bottom:8px}
.h1{font-size:56px;line-height:1;font-weight:800;letter-spacing:-1.5px;margin:0 0 8px}
.h1.med{font-size:44px}
.lede{color:var(--muted);margin:0 0 28px;font-size:15px}

/* section labels */
.section-head{display:flex;align-items:center;justify-content:space-between;margin:36px 0 14px;gap:12px}
.section-head h2{font-size:22px;font-weight:700;margin:0;letter-spacing:-.3px}
.section-label{font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--label);font-weight:600}
.add-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--line);border-radius:99px;color:var(--ink-2);background:var(--card);font-size:13px;font-weight:500}
.add-btn:hover{border-color:var(--ink-2);background:var(--card-2)}
.add-btn .plus{font-weight:600;color:var(--accent-deep)}

/* priorities row */
.priorities{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;margin-bottom:24px;scrollbar-width:none}
.priorities::-webkit-scrollbar{display:none}
.priority{flex:0 0 220px;background:var(--card-2);border:1px solid var(--line);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:10px;position:relative}
.priority .num{font-size:28px;font-weight:800;line-height:1;color:var(--ink)}
.priority .label{color:var(--ink-2);font-size:13px;font-weight:500}
.priority .x{position:absolute;top:8px;right:10px;color:var(--muted);opacity:0;font-size:14px;cursor:pointer}
.priority:hover .x{opacity:1}
.priority.add{align-items:center;justify-content:center;color:var(--muted);border-style:dashed;cursor:pointer;min-height:96px}
.priority.add:hover{color:var(--ink-2);border-color:var(--ink-2)}

/* period tabs */
.period-tabs{display:inline-flex;gap:4px;background:var(--card-2);border-radius:99px;padding:4px;border:1px solid var(--line)}
.period-tabs button{padding:7px 18px;border-radius:99px;color:var(--ink-2);font-size:13px;font-weight:500}
.period-tabs button.active{background:var(--ink);color:#fff}

/* grid */
.grid{display:grid;gap:18px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-auto{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}

/* card */
.card{
  background:var(--card);border:1px solid var(--line);border-radius:18px;
  padding:0;overflow:hidden;display:flex;flex-direction:column;
}
.card .top-bar{height:6px;background:var(--bg-2);position:relative}
.card .top-bar > i{display:block;height:100%;background:var(--accent);transition:width .35s}
.card .body{padding:20px 22px 22px}
.card h3{margin:0;font-size:18px;font-weight:700;letter-spacing:-.2px}
.card .sub{color:var(--muted);font-size:13px;margin-top:2px}
.card .pct{color:var(--muted);font-size:13px;margin:10px 0 14px}
.card .pct b{color:var(--ink);font-weight:600}

/* checklist */
.checklist{display:flex;flex-direction:column;gap:2px}
.task{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);position:relative}
.task:last-child{border-bottom:0}
.task .check{flex-shrink:0;width:18px;height:18px;border:1.5px solid var(--line-2);border-radius:5px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;background:var(--card)}
.task .check.on{background:var(--ink);border-color:var(--ink)}
.task .check.on::after{content:"";width:9px;height:5px;border-left:1.5px solid var(--accent);border-bottom:1.5px solid var(--accent);transform:rotate(-45deg) translate(1px,-1px)}
.task .txt{flex:1;min-width:0;color:var(--ink);font-size:14px}
.task.done .txt{color:var(--muted);text-decoration:line-through;text-decoration-thickness:1px}
.date-pill{padding:3px 10px;background:var(--bg-2);border-radius:99px;font-size:11px;color:var(--muted);font-weight:500;white-space:nowrap;cursor:pointer}
.date-pill.overdue{background:#FBE3E0;color:var(--danger);font-weight:600}
.date-pill.soon{color:var(--ink-2)}
.task .menu{opacity:0;color:var(--muted);font-size:18px;line-height:1;padding:0 4px;cursor:pointer}
.task:hover .menu{opacity:1}

/* avatar + person */
.person-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 22px;display:flex;flex-direction:column;gap:14px}
.person-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.avatar{width:42px;height:42px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:14px;letter-spacing:.3px;flex-shrink:0}
.person-info{flex:1;min-width:0}
.person-info .name{font-size:18px;font-weight:700;letter-spacing:-.2px}
.person-info .role{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:2px}
.donut{position:relative;width:54px;height:54px;flex-shrink:0}
.donut svg{transform:rotate(-90deg);width:54px;height:54px}
.donut .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}

/* status pill */
.status{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-2);padding:4px 10px;border:1px solid var(--line);border-radius:99px;background:var(--card);white-space:nowrap;cursor:pointer;text-transform:lowercase;font-weight:500;letter-spacing:.2px}
.status .pip{width:6px;height:6px;border-radius:50%;background:var(--muted)}
.status.ok .pip{background:var(--ok)}
.status.risk .pip{background:var(--warn)}
.status.blocked .pip{background:var(--danger)}
.status.done .pip{background:var(--ink)}

.tag{display:inline-block;padding:2px 9px;border:1px solid var(--line);border-radius:99px;font-size:11px;color:var(--muted);letter-spacing:.3px;text-transform:lowercase;cursor:pointer;background:var(--card)}
.tag:hover{border-color:var(--line-2)}

/* initiative list row */
.init-row{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:18px;position:relative}
.init-row .meta{color:var(--muted);font-size:12px;white-space:nowrap}
.init-row .title{flex:1;min-width:0}
.init-row .title-t{font-size:16px;font-weight:600}
.init-row .title-s{color:var(--muted);font-size:13px;margin-top:2px}
.init-row .progress-wrap{width:200px;display:flex;align-items:center;gap:10px}
.init-row .bar{flex:1;height:6px;background:var(--bg-2);border-radius:99px;overflow:hidden;cursor:ew-resize}
.init-row .bar > i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .25s}
.init-row .menu{opacity:0;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px}
.init-row:hover .menu{opacity:1}

/* strategy */
.vision{font-family:var(--serif);font-size:34px;line-height:1.2;font-style:italic;color:var(--ink-2);max-width:780px;margin:0 0 8px;padding:8px 4px}
.pillar{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px}
.pillar h4{margin:0 0 8px;font-size:18px;font-weight:700}
.pillar p{margin:0;color:var(--muted)}
.okr{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.okr:last-child{border-bottom:0}
.okr-text .obj{font-size:16px;font-weight:600}
.okr-text .kr{color:var(--muted);font-size:13px;margin-top:2px}
.okr-prog{width:220px;display:flex;align-items:center;gap:10px}
.okr-prog .bar{flex:1;height:6px;background:var(--bg-2);border-radius:99px;overflow:hidden;cursor:ew-resize}
.okr-prog .bar > i{display:block;height:100%;background:var(--accent);border-radius:99px}

/* recognitions */
.recog-item{padding:18px 0;border-bottom:1px dashed var(--line);display:flex;gap:18px;align-items:flex-start}
.recog-item:last-child{border-bottom:0}
.recog-item .quote{flex:1;font-family:var(--serif);font-size:20px;line-height:1.35;font-style:italic;color:var(--ink-2)}
.recog-item .meta{color:var(--muted);font-size:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px}

/* modal */
.modal{position:fixed;inset:0;background:rgba(15,15,14,.32);display:flex;align-items:flex-start;justify-content:center;padding-top:14vh;z-index:50;backdrop-filter:blur(6px)}
.modal[hidden]{display:none}
.modal-card{width:min(520px,92vw);background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 30px 60px rgba(0,0,0,.10)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line)}
.modal-head .title{font-weight:700;font-size:15px}
.modal-head .x{font-size:22px;color:var(--muted);line-height:1}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:600}
.field input,.field select,.field textarea{padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card);font-size:14px}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--ink-2)}
.field textarea{resize:vertical;min-height:80px;font-family:inherit}
.modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.btn{padding:9px 16px;border-radius:99px;font-weight:500;font-size:13px;cursor:pointer;border:1px solid var(--line);background:var(--card)}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.primary:hover{background:#000}
.btn.ghost:hover{background:var(--card-2)}
.btn.danger{color:var(--danger);border-color:var(--danger)}

/* capture (kept) */
#captureInput{width:100%;padding:12px 0;border:0;border-bottom:1px solid var(--line);background:transparent;font-size:22px;font-weight:600;letter-spacing:-.3px}
#captureInput::placeholder{color:var(--muted);font-weight:400}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:99px;padding:3px;width:fit-content;background:var(--card-2)}
.seg button{padding:5px 14px;border-radius:99px;color:var(--muted);font-size:13px}
.seg button.active{background:var(--card);color:var(--ink);font-weight:500}

/* dropdown */
.dd{position:absolute;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px;box-shadow:0 12px 30px rgba(0,0,0,.10);z-index:60;min-width:160px}
.dd button{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:8px 10px;border-radius:8px;font-size:13px}
.dd button:hover{background:var(--card-2)}
.dd button.danger{color:var(--danger)}
.dd .sep{height:1px;background:var(--line);margin:4px 0}

/* mode toggle */
.mode-toggle{display:inline-flex;align-items:center;gap:4px;font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);padding:3px 8px;border:1px solid var(--line);border-radius:99px;background:var(--card);cursor:pointer;font-weight:600}
.mode-toggle.auto{color:var(--accent-deep);border-color:var(--accent-deep)}
.mode-toggle:hover{border-color:var(--ink-2)}

/* next step pill */
.next-step{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#FFF7D6;border:1px solid #F3E29F;border-radius:99px;font-size:12px;color:var(--ink-2);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.next-step .label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#8B7A2C;font-weight:600}
.next-step .empty{color:var(--muted);font-style:italic}

/* search palette */
.search-results{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;margin-top:4px}
.search-result{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent}
.search-result:hover, .search-result.sel{background:var(--card-2);border-color:var(--line)}
.search-result .kind{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--label);font-weight:700;min-width:90px}
.search-result .what{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-result .meta{color:var(--muted);font-size:11px}

/* review modal — wider */
.modal-card.wide{width:min(720px,94vw)}
.review-section{margin-bottom:20px}
.review-section .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.review-section .head .label{font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:var(--label);font-weight:600}
.review-section .head .count{font-size:20px;font-weight:700}
.review-section ul{list-style:none;padding:0;margin:0;border-top:1px solid var(--line)}
.review-section li{padding:8px 0;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;font-size:13px}
.review-section li .name{font-weight:600}
.review-section li .muted{color:var(--muted)}

/* toolbar */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.icon-btn{width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink-2);cursor:pointer}
.icon-btn:hover{border-color:var(--ink-2)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:99px;font-size:13px;z-index:100;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

/* utilities */
.row-flex{display:flex;align-items:center;gap:10px}
.between{justify-content:space-between}
.mt-2{margin-top:10px}.mt-3{margin-top:16px}.mt-4{margin-top:24px}.mb-3{margin-bottom:16px}

@media (max-width: 900px){
  .topbar{padding:14px 18px}
  .view{padding:24px 18px 60px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .h1{font-size:42px}
  .init-row{flex-wrap:wrap}
  .init-row .progress-wrap{width:100%}
}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="topbar-row">
      <div class="brand"><span class="brand-dot"></span><span data-edit="user.workspace">Command Center</span></div>
      <div class="topbar-right">
        <button class="kbd-trigger" id="kTrigger"><span class="k">⌘K</span><span class="muted">search · create</span></button>
        <button class="kbd-trigger" id="reviewBtn" title="Weekly Review"><span class="k">R</span><span class="muted">review</span></button>
        <span class="date" id="today"></span>
        <div class="row-flex" style="gap:6px">
          <button class="icon-btn" id="exportXlsx" title="Export to Excel">↓</button>
          <button class="icon-btn" id="importXlsxBtn" title="Import from Excel">↑</button>
          <input type="file" id="importXlsx" accept=".xlsx,.xls" style="display:none" />
        </div>
      </div>
    </div>
    <nav class="tabs-top" id="nav">
      <a data-route="home">Command</a>
      <a data-route="strategy">Strategy &amp; Vision</a>
      <a data-route="initiatives">Initiatives</a>
      <a data-route="recognitions">Recognitions</a>
      <a data-route="team">Team</a>
    </nav>
  </header>
  <main class="view" id="view"></main>
</div>

<!-- Command palette (search + capture) -->
<div class="modal" id="captureModal" hidden>
  <div class="modal-card">
    <div class="modal-head"><span class="title">search · create</span><button class="x" data-close="captureModal">×</button></div>
    <div class="modal-body">
      <input id="captureInput" placeholder="type to search initiatives, tasks, people… or create" autocomplete="off" />
      <div id="searchResults" class="search-results"></div>
      <div id="captureControls">
        <div class="seg" id="captureType">
          <button data-type="task" class="active">create task</button>
          <button data-type="recognition">recognition</button>
          <button data-type="request">request</button>
        </div>
      </div>
      <div class="muted" style="font-size:12px;text-align:right">↑↓ navigate · enter to open/create · esc to close</div>
    </div>
  </div>
</div>

<!-- Weekly review -->
<div class="modal" id="reviewModal" hidden>
  <div class="modal-card wide">
    <div class="modal-head"><span class="title" id="reviewTitle">Weekly Review</span><button class="x" data-close="reviewModal">×</button></div>
    <div class="modal-body" id="reviewBody"></div>
    <div class="modal-foot">
      <button class="btn ghost" data-close="reviewModal">Close</button>
    </div>
  </div>
</div>

<!-- Generic add/edit form modal -->
<div class="modal" id="formModal" hidden>
  <div class="modal-card">
    <div class="modal-head"><span class="title" id="formTitle">New</span><button class="x" data-close="formModal">×</button></div>
    <div class="modal-body" id="formBody"></div>
    <div class="modal-foot">
      <button class="btn ghost" data-close="formModal">Cancel</button>
      <button class="btn primary" id="formSave">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ====================== SEED ======================
const SEED = {
  user:{ name:"Damian", role:"Director — LATAM", workspace:"Command Center" },
  priorities:[
    { id:"pr1", label:"Centralize MDM across LATAM" },
    { id:"pr2", label:"Lock S&OP operating rhythm" },
    { id:"pr3", label:"Reduce MRO leakage 15%" },
    { id:"pr4", label:"Grow next-layer leaders" }
  ],
  strategy:{
    vision:"Build a data-driven, people-first supply chain operation across LATAM — fewer fires, more foresight.",
    horizon:"FY26",
    pillars:[
      { id:"p1", name:"Data Foundations",       summary:"Trustworthy master data and clean domains as the bedrock for every decision.", color:"#6B5BD3" },
      { id:"p2", name:"Operational Excellence", summary:"Standard S&OP rhythm, MRO discipline and end-to-end visibility across plants.", color:"#A8C634" },

const STORE_KEY="command-center-v2";
let state = load();

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if (raw){ const s=JSON.parse(raw); return migrate(s); }
    const v1 = localStorage.getItem("command-center-v1");
    if (v1){ return migrate(JSON.parse(v1)); }
  } catch(e){}
  return JSON.parse(JSON.stringify(SEED));
}
function migrate(s){
  const base = JSON.parse(JSON.stringify(SEED));
  s.user = Object.assign({}, base.user, s.user||{});
  s.priorities = s.priorities || base.priorities;
  s.strategy = s.strategy || base.strategy;
  s.initiatives = (s.initiatives || []).map(i => ({ progressMode: "auto", nextStep: "", ...i }));
  s.tasks = (s.tasks||[]).map(t => ({ owner: deriveOwner(t, s), completedAt: t.done ? (t.completedAt || t.due || "") : "", ...t }));
  s.recognitions = s.recognitions || [];
  s.team = s.team || [];
  return s;
}
function deriveOwner(t, s){
  if (t.owner) return t.owner;
  const i = (s.initiatives||[]).find(x=>x.id===t.initiative);
  return i?.owner || "";
}
function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){} }

const fmtDate = iso => { if(!iso) return ""; const d=new Date(iso+"T00:00:00"); return isNaN(d)?iso:d.toLocaleDateString("en-US",{month:"short",day:"numeric"}); };
const fmtFull = d => d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
const greeting = () => { const h=new Date().getHours(); if(h<5)return"Late night"; if(h<12)return"Good morning"; if(h<18)return"Good afternoon"; return"Good evening"; };

function getPath(obj, path){ return path.split(".").reduce((o,k)=>o?.[k], obj); }
function setPath(obj, path, val){
  const parts = path.split("."); const last = parts.pop();
  const target = parts.reduce((o,k)=>o[k], obj);
  target[last] = val;
}

function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),1700); }

function initials(name){
  return String(name||"?").trim().split(/\s+/).slice(0,2).map(s=>s[0]||"").join("").toUpperCase();
}
const AVATAR_COLORS = ["#6B5BD3","#A8C634","#D4A93A","#3C7EA4","#B5524A","#7BAE3A","#5E5246","#9268C5"];
function avatarColor(name){
  let h=0; for(const c of String(name||"")) h=(h*31 + c.charCodeAt(0))>>>0;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}
function avatar(name, size=42){
  const c = avatarColor(name);
  return `<span class="avatar" style="width:${size}px;height:${size}px;background:${c};font-size:${Math.round(size*.34)}px">${escapeHTML(initials(name))}</span>`;
}
function donut(pct, size=54, stroke=5){
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - (pct||0));
  return `<div class="donut" style="width:${size}px;height:${size}px">
    <svg viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--bg-2)" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--accent-deep)" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
    </svg>
    <div class="pct">${Math.round((pct||0)*100)}%</div>
  </div>`;
}

function endOfMonth(d=new Date()){ return new Date(d.getFullYear(), d.getMonth()+1, 0, 23, 59, 59, 999); }
function bucketOf(t){
  if (!t.due) return t.horizon || "weekly";
  const d = new Date(t.due+"T00:00:00");
  if (isNaN(d)) return t.horizon || "weekly";
  if (d <= endOfWeek()) return "weekly";
  if (d <= endOfMonth()) return "monthly";
  return "quarterly";
}
function progressFor(horizon){
  const list = state.tasks.filter(t=>!isArchived(t) && bucketOf(t)===horizon);
  if (!list.length) return { pct:0, done:0, total:0 };
  const done = list.filter(t=>t.done).length;
  return { pct: done/list.length, done, total: list.length };
}
function overallProgress(){
  const active = state.tasks.filter(t=>!isArchived(t));
  if (!active.length) return 0;
  return active.filter(t=>t.done).length / active.length;
}
function tasksByOwner(name, horizon){
  return state.tasks.filter(t => !isArchived(t) && (t.owner||"")===name && (!horizon || bucketOf(t)===horizon));
}
function ownerProgress(name, horizon){
  const l = tasksByOwner(name, horizon);
  if (!l.length) return 0;
  return l.filter(t=>t.done).length / l.length;
}

function startOfToday(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function isArchived(t){
  if (!t.done || !t.completedAt) return false;
  const c = new Date(t.completedAt+"T00:00:00");
  if (isNaN(c)) return false;
  return (startOfToday() - c) / 86400000 > 7;
}
function isOverdue(t){ if (t.done || !t.due) return false; const d=new Date(t.due+"T00:00:00"); return d < startOfToday(); }
function dueClass(t){ if (t.done) return ""; if (isOverdue(t)) return "overdue"; const d=new Date(t.due+"T00:00:00"); const diff=(d-startOfToday())/86400000; return (diff>=0 && diff<=2) ? "soon" : ""; }
function overdueCount(){ return state.tasks.filter(isOverdue).length; }

function tasksForInitiative(id){ return state.tasks.filter(t=>t.initiative===id); }
function initiativeProgress(i){
  if (i.progressMode === "manual") return i.progress || 0;
  const list = tasksForInitiative(i.id);
  if (!list.length) return i.progress || 0;
  return list.filter(t=>t.done).length / list.length;
}

function startOfWeek(d=new Date()){ const dt=new Date(d); dt.setHours(0,0,0,0); const day=(dt.getDay()+6)%7; dt.setDate(dt.getDate()-day); return dt; }
function endOfWeek(d=new Date()){ const s=startOfWeek(d); const e=new Date(s); e.setDate(s.getDate()+6); e.setHours(23,59,59,999); return e; }
function inWeek(iso){ if(!iso) return false; const d=new Date(iso+"T00:00:00"); return d>=startOfWeek() && d<=endOfWeek(); }
function fmtRange(a,b){ const o={month:"short",day:"numeric"}; return `${a.toLocaleDateString("en-US",o)} – ${b.toLocaleDateString("en-US",o)}`; }

const ALL_OWNERS = () => Array.from(new Set([state.user.name, ...state.team.map(m=>m.name)]));
function ownersForFilter(filter){
  if (filter === "mine") return [state.user.name];
  if (filter === "team") return state.team.map(m=>m.name).filter(n=>n!==state.user.name);
  return ALL_OWNERS();
}
function personForOwner(name){
  if (name === state.user.name) return { id:"__me", name:state.user.name, role:state.user.role, isMe:true };
  return state.team.find(m=>m.name===name);
}

const routes = { home:viewHome, strategy:viewStrategy, initiatives:viewInitiatives, recognitions:viewRecognitions, team:viewTeam };
let route = "home";
function go(r){ if(!routes[r])return; route=r; render(); }

function render(){
  $("#view").innerHTML = routes[route]();
  $$("#nav a").forEach(a=>a.classList.toggle("active",a.dataset.route===route));
  bindHandlers();
}

// ====================== HANDLERS ======================
function findItemById(listPath, id){
  const list = getPath(state, listPath);
  if (!Array.isArray(list)) return null;
  return list.find(x=>x.id===id);
}

function bindHandlers(){
  // nav
  $$("#nav a").forEach(a=>a.onclick=()=>go(a.dataset.route));

  // period tabs
  $$("#hTabs button").forEach(b=>b.onclick=()=>{ currentHorizon=b.dataset.h; render(); });

  // inline edit (single object path)
  $$("[data-edit]").forEach(el=>{
    if (el.getAttribute("contenteditable") == null) el.setAttribute("contenteditable","plaintext-only");
    el.onblur = () => {
      const path = el.dataset.edit;
      const newVal = el.textContent.trim();
      if (getPath(state, path) === newVal) return;
      setPath(state, path, newVal);
      save();
      if (path.startsWith("user.workspace") || path.startsWith("user.name")) {/* re-render not needed */}
    };
    el.onkeydown = e => { if(e.key==="Enter"){ e.preventDefault(); el.blur(); } };
  });

  // inline edit (list item)
  $$("[data-edit-list]").forEach(el=>{
    if (el.getAttribute("contenteditable") == null) el.setAttribute("contenteditable","plaintext-only");
    el.onblur = () => {
      const item = findItemById(el.dataset.editList, el.dataset.id);
      if (!item) return;
      const field = el.dataset.field;
      const newVal = el.textContent.trim();
      if (item[field] === newVal) return;
      item[field] = newVal;
      save();
    };
    el.onkeydown = e => { if(e.key==="Enter"){ e.preventDefault(); el.blur(); } };
  });

  // checkboxes
  $$(".check[data-task]").forEach(el=>el.onclick=()=>{
    const t = state.tasks.find(x=>x.id===el.dataset.task);
    if(t){
      t.done = !t.done;
      t.completedAt = t.done ? new Date().toISOString().slice(0,10) : "";
      save(); render();
    }
  });

  // scope tabs (mine/team/everyone)
  $$("#sTabs button").forEach(b=>b.onclick=()=>{ currentScope=b.dataset.s; render(); });

  // progress mode toggle (auto/manual)
  $$("[data-prog-mode]").forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    const it = initiativeById(b.dataset.progMode);
    if (!it) return;
    it.progressMode = (it.progressMode === "auto") ? "manual" : "auto";
    save(); render();
  });

  // progress bars (drag)
  $$("[data-prog]").forEach(bar=>{
    const setFromEvent = (e) => {
      const r = bar.getBoundingClientRect();
      const x = (e.touches?e.touches[0].clientX:e.clientX) - r.left;
      const pct = Math.max(0, Math.min(1, x / r.width));
      const [kind, id] = bar.dataset.prog.split(":");
      if (kind === "initiative"){ const it = initiativeById(id); if(it){ it.progress = pct; it.progressMode = "manual"; } }
      if (kind === "okr"){ const o = state.strategy.okrs.find(x=>x.id===id); if(o) o.progress = pct; }
      bar.querySelector("i").style.width = (pct*100)+"%";
    };
    let dragging = false;
    bar.onmousedown = e=>{ dragging=true; setFromEvent(e); };
    bar.ontouchstart = e=>{ dragging=true; setFromEvent(e); };
    document.addEventListener("mousemove", e=>{ if(dragging) setFromEvent(e); });
    document.addEventListener("touchmove", e=>{ if(dragging) setFromEvent(e); });
    document.addEventListener("mouseup", ()=>{ if(dragging){ dragging=false; save(); render(); } });
    document.addEventListener("touchend", ()=>{ if(dragging){ dragging=false; save(); render(); } });
  });

  // pickers (status, pillar, type…)
  $$("[data-pick]").forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const [kind, ...rest] = el.dataset.pick.split(":");
    openPicker(el, kind, rest);
  });

  // date pills
  $$("[data-date]").forEach(el=>el.onclick=e=>{ e.stopPropagation(); openDate(el, "task", el.dataset.date); });
  $$("[data-date-init]").forEach(el=>el.onclick=e=>{ e.stopPropagation(); openDate(el, "initiative", el.dataset.dateInit); });
  $$("[data-date-recog]").forEach(el=>el.onclick=e=>{ e.stopPropagation(); openDate(el, "recognition", el.dataset.dateRecog); });
  $$("[data-date-member]").forEach(el=>el.onclick=e=>{ e.stopPropagation(); openDate(el, "member", el.dataset.dateMember); });

  // hover menus
  $$("[data-menu]").forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    openItemMenu(el, el.dataset.menu);
  });

  // add buttons
  $$("[data-add]").forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    openAddModal(el.dataset.add, el.dataset);
  });

  // delete inline
  $$("[data-del]").forEach(el=>el.onclick=e=>{
    e.stopPropagation();
    const [kind,id] = el.dataset.del.split(":");
    deleteItem(kind, id);
  });
}

// ====================== PICKERS / DROPDOWNS ======================
let openDD = null;
function closeDD(){ if(openDD){ openDD.remove(); openDD=null; } }
document.addEventListener("click", closeDD);

function showDD(anchor, items){
  closeDD();
  const dd = document.createElement("div");
  dd.className = "dd";
  items.forEach(it=>{
    if (it.sep){ const s=document.createElement("div"); s.className="sep"; dd.appendChild(s); return; }
    const b = document.createElement("button");
    if (it.danger) b.className = "danger";
    b.textContent = it.label;
    b.onclick = (e)=>{ e.stopPropagation(); it.action(); closeDD(); };
    dd.appendChild(b);
  });
  document.body.appendChild(dd);
  const r = anchor.getBoundingClientRect();
  dd.style.top = (window.scrollY + r.bottom + 6) + "px";
  dd.style.left = (window.scrollX + r.left) + "px";
  openDD = dd;
}

function openPicker(anchor, kind, rest){
  if (kind === "status"){
    const id = rest[0]; const it = initiativeById(id);
    const opts = ["on-track","at-risk","blocked","done"];
    showDD(anchor, opts.map(o=>({label:statusMap[o].label, action:()=>{ it.status=o; save(); render(); }})));
  }
  else if (kind === "pillar"){
    const id = rest[0]; const it = initiativeById(id);
    const opts = state.strategy.pillars.map(p=>({label:p.name, action:()=>{ it.pillar=p.id; save(); render(); }}));
    opts.push({sep:true});
    opts.push({label:"(none)", action:()=>{ it.pillar=null; save(); render(); }});
    showDD(anchor, opts);
  }
  else if (kind === "okr-pillar"){
    const id = rest[0]; const o = state.strategy.okrs.find(x=>x.id===id);
    showDD(anchor, state.strategy.pillars.map(p=>({label:p.name, action:()=>{ o.pillar=p.id; save(); render(); }})));
  }
  else if (kind === "task-init"){
    const id = rest[0]; const t = state.tasks.find(x=>x.id===id);
    const items = state.initiatives.map(i=>({label:i.title, action:()=>{ t.initiative=i.id; save(); render(); }}));
    items.push({sep:true});
    items.push({label:"(none)", action:()=>{ t.initiative=null; save(); render(); }});
    showDD(anchor, items);
  }
  else if (kind === "task-owner"){
    const id = rest[0]; const t = state.tasks.find(x=>x.id===id);
    const items = state.team.map(m=>({label:m.name, action:()=>{ t.owner=m.name; save(); render(); }}));
    items.push({sep:true});
    items.push({label:"unassigned", action:()=>{ t.owner=""; save(); render(); }});
    showDD(anchor, items);
  }
  else if (kind === "recog-type"){
    const id = rest[0]; const r = state.recognitions.find(x=>x.id===id);
    ["impact","effort","values","growth"].forEach(()=>{});
    showDD(anchor, ["impact","effort","values","growth"].map(o=>({label:o, action:()=>{ r.type=o; save(); render(); }})));
  }
  else if (kind === "req-status"){
    const [mid, rid] = rest;
    const m = state.team.find(x=>x.id===mid); const req = m?.requests?.find(x=>x.id===rid);
    showDD(anchor, ["pending","approved","blocked","done"].map(o=>({label:o, action:()=>{ req.status=o; save(); render(); }})));
  }
}

function openDate(anchor, kind, id){
  closeDD();
  const inp = document.createElement("input");
  inp.type = "date";
  let current = "";
  if (kind==="task"){ current = state.tasks.find(x=>x.id===id)?.due || ""; }
  if (kind==="initiative"){ current = initiativeById(id)?.due || ""; }
  if (kind==="recognition"){ current = state.recognitions.find(x=>x.id===id)?.date || ""; }
  if (kind==="member"){ current = state.team.find(x=>x.id===id)?.next1on1 || ""; }
  inp.value = current;
  const dd = document.createElement("div");
  dd.className = "dd";
  dd.appendChild(inp);
  dd.addEventListener("click", e => e.stopPropagation());
  document.body.appendChild(dd);
  const r = anchor.getBoundingClientRect();
  dd.style.top = (window.scrollY + r.bottom + 6) + "px";
  dd.style.left = (window.scrollX + r.left) + "px";
  openDD = dd;
  setTimeout(()=>{ inp.focus(); if (inp.showPicker) try{ inp.showPicker(); }catch(e){} },10);
  inp.onchange = () => {
    const v = inp.value;
    if (kind==="task"){ const t = state.tasks.find(x=>x.id===id); if(t) t.due=v; }
    if (kind==="initiative"){ const it = initiativeById(id); if(it) it.due=v; }
    if (kind==="recognition"){ const rec = state.recognitions.find(x=>x.id===id); if(rec) rec.date=v; }
    if (kind==="member"){ const m = state.team.find(x=>x.id===id); if(m) m.next1on1=v; }
    save(); closeDD(); render();
  };
}

function openItemMenu(anchor, spec){
  const [kind, ...rest] = spec.split(":");
  const items = [{label:"Delete", danger:true, action:()=>deleteItem(kind, ...rest)}];
  showDD(anchor, items);
}

function deleteItem(kind, ...ids){
  if (kind==="task"){ state.tasks = state.tasks.filter(t=>t.id!==ids[0]); }
  else if (kind==="initiative"){ state.initiatives = state.initiatives.filter(i=>i.id!==ids[0]); }
  else if (kind==="recognition"){ state.recognitions = state.recognitions.filter(r=>r.id!==ids[0]); }
  else if (kind==="pillar"){ state.strategy.pillars = state.strategy.pillars.filter(p=>p.id!==ids[0]); }
  else if (kind==="okr"){ state.strategy.okrs = state.strategy.okrs.filter(o=>o.id!==ids[0]); }
  else if (kind==="member"){ state.team = state.team.filter(m=>m.id!==ids[0]); }
  else if (kind==="priorities"){ state.priorities = state.priorities.filter(p=>p.id!==ids[0]); }
  else if (kind==="ooo"){ const m=state.team.find(x=>x.id===ids[0]); if(m){ (m.ooo||[]).splice(parseInt(ids[1],10),1); } }
  else if (kind==="request"){ const m=state.team.find(x=>x.id===ids[0]); if(m){ m.requests = (m.requests||[]).filter(r=>r.id!==ids[1]); } }
  save(); render(); toast("Deleted");
}

function openAddModal(kind, extras){
  const def = FORMS[kind]; if(!def) return;
  $("#formTitle").textContent = def.title;
  const body = $("#formBody");
  body.innerHTML = "";
  def.fields.forEach(f=>{
    const wrap = document.createElement("div");
    wrap.className = "field";
    const id = "f_"+f.name;
    let input;
    if (f.type === "textarea"){ input = document.createElement("textarea"); }
    else if (f.type === "select"){
      input = document.createElement("select");
      f.options.forEach(([val,lab])=>{ const o=document.createElement("option"); o.value=val; o.textContent=lab; input.appendChild(o); });
    }
    else if (f.type === "select-pillar"){
      input = document.createElement("select");
      const blank = document.createElement("option"); blank.value=""; blank.textContent="(none)"; input.appendChild(blank);
      state.strategy.pillars.forEach(p=>{ const o=document.createElement("option"); o.value=p.id; o.textContent=p.name; input.appendChild(o); });
    }
    else if (f.type === "select-init"){
      input = document.createElement("select");
      const blank = document.createElement("option"); blank.value=""; blank.textContent="(none)"; input.appendChild(blank);
      state.initiatives.forEach(i=>{ const o=document.createElement("option"); o.value=i.id; o.textContent=i.title; input.appendChild(o); });
    }
    else if (f.type === "select-team"){
      input = document.createElement("select");
      const blank = document.createElement("option"); blank.value=""; blank.textContent="(unassigned)"; input.appendChild(blank);
      state.team.forEach(m=>{ const o=document.createElement("option"); o.value=m.name; o.textContent=m.name; input.appendChild(o); });
      if (extras?.owner) input.value = extras.owner;
    }
    else { input = document.createElement("input"); input.type = f.type === "date" ? "date" : "text"; }
    input.id = id; input.name = f.name;
    if (f.default && !input.value) input.value = f.default;
    if (f.required) input.required = true;
    const lbl = document.createElement("label"); lbl.textContent = f.label; lbl.htmlFor = id;
    wrap.appendChild(lbl); wrap.appendChild(input);
    body.appendChild(wrap);
  });
  $("#formModal").hidden = false;
  setTimeout(()=>{ const first = body.querySelector("input,textarea,select"); first && first.focus(); }, 30);
  $("#formSave").onclick = () => {
    const v = {};
    let missing = false;
    def.fields.forEach(f=>{
      const el = body.querySelector("[name='"+f.name+"']");
      v[f.name] = el?.value?.trim?.() ?? el?.value ?? "";
      if (f.required && !v[f.name]) missing = true;
    });
    if (missing){ toast("Fill required fields"); return; }
    def.save(v, extras||{});
    save();
    $("#formModal").hidden = true;
    render();
    toast("Added");
  };
}

// ====================== COMMAND PALETTE (search + capture) ======================
let captureType="task";
let searchSelIdx = 0;
let searchHits = [];

function openCapture(){ $("#captureModal").hidden=false; setTimeout(()=>{ $("#captureInput").focus(); $("#captureInput").select?.(); refreshPalette(); },30); }
function closeCapture(){ $("#captureModal").hidden=true; $("#captureInput").value=""; $("#searchResults").innerHTML=""; searchHits=[]; }

function searchAll(q){
  const ql = q.toLowerCase();
  const hits = [];
  const push = (kind, route, label, meta, action) => hits.push({ kind, route, label, meta, action });
  state.initiatives.forEach(i=>{
    if (i.title.toLowerCase().includes(ql) || (i.summary||"").toLowerCase().includes(ql))
      push("initiative", "initiatives", i.title, i.owner||"", ()=>go("initiatives"));
  });
  state.tasks.forEach(t=>{
    if (t.title.toLowerCase().includes(ql))
      push("task", "home", t.title, `${bucketOf(t)} · ${t.owner||"unassigned"}`, ()=>{ currentHorizon=bucketOf(t); go("home"); });
  });
  state.recognitions.forEach(r=>{
    if ((r.note||"").toLowerCase().includes(ql) || (r.person||"").toLowerCase().includes(ql))
      push("recognition", "recognitions", r.note, `${r.person} · ${fmtDate(r.date)}`, ()=>go("recognitions"));
  });
  state.team.forEach(m=>{
    if (m.name.toLowerCase().includes(ql) || (m.role||"").toLowerCase().includes(ql))
      push("person", "team", m.name, m.role, ()=>go("team"));
  });
  (state.strategy.okrs||[]).forEach(o=>{
    if ((o.objective||"").toLowerCase().includes(ql) || (o.kr||"").toLowerCase().includes(ql))
      push("okr", "strategy", o.objective, o.kr, ()=>go("strategy"));
  });
  (state.strategy.pillars||[]).forEach(p=>{
    if (p.name.toLowerCase().includes(ql)) push("pillar", "strategy", p.name, p.summary, ()=>go("strategy"));
  });
  return hits.slice(0, 12);
}

function refreshPalette(){
  const q = $("#captureInput").value.trim();
  const results = $("#searchResults");
  const controls = $("#captureControls");
  if (!q){
    results.innerHTML = "";
    searchHits = [];
    controls.style.display = "";
    return;
  }
  searchHits = searchAll(q);
  searchSelIdx = 0;
  if (!searchHits.length){
    results.innerHTML = `<div class="muted" style="padding:10px 4px;font-size:13px">No matches. Press enter to create.</div>`;
  } else {
    results.innerHTML = searchHits.map((h,idx)=>`
      <div class="search-result ${idx===0?'sel':''}" data-idx="${idx}">
        <span class="kind">${h.kind}</span>
        <span class="what">${escapeHTML(h.label)}</span>
        <span class="meta">${escapeHTML(h.meta||"")}</span>
      </div>`).join("");
    $$(".search-result", results).forEach(el=>{
      el.onmouseenter = () => { searchSelIdx = parseInt(el.dataset.idx,10); updateSel(); };
      el.onclick = () => { runHit(parseInt(el.dataset.idx,10)); };
    });
  }
  controls.style.display = "";
}
function updateSel(){
  $$(".search-result").forEach((el,i)=>el.classList.toggle("sel", i===searchSelIdx));
}
function runHit(idx){
  const h = searchHits[idx]; if (!h) return;
  closeCapture();
  h.action();
}

function commitCapture(){
  if (searchHits.length){ runHit(searchSelIdx); return; }
  const text=$("#captureInput").value.trim(); if(!text)return;
  const today=new Date().toISOString().slice(0,10);
  if(captureType==="task"){
    state.tasks.unshift({ id:uid("t"), title:text, horizon:"weekly", initiative:null, owner:state.user.name, due:today, done:false });
  } else if(captureType==="recognition"){
    state.recognitions.unshift({ id:uid("r"), date:today, person:"—", type:"impact", note:text });
  } else if(captureType==="request"){
    const me=state.team[0]; if(me){ me.requests=me.requests||[]; me.requests.push({ id:uid("q"), title:text, status:"pending" }); }
  }
  save(); closeCapture(); render(); toast("Saved");
}

// ====================== WEEKLY REVIEW ======================
function openReview(){
  const s = startOfWeek(), e = endOfWeek();
  const completed = state.tasks.filter(t => t.done && t.completedAt && inWeek(t.completedAt));
  const overdue = state.tasks.filter(isOverdue);
  const horizonNow = new Date(); const in14 = new Date(); in14.setDate(in14.getDate()+14);
  const upcomingOOO = state.team.flatMap(m => (m.ooo||[]).map(o => ({...o, name:m.name}))).filter(o => {
    const from = new Date(o.from); return from >= horizonNow && from <= in14;
  }).sort((a,b)=>a.from.localeCompare(b.from));
  const byOwner = {};
  completed.forEach(t => { if(!t.owner) return; byOwner[t.owner] = (byOwner[t.owner]||0)+1; });
  const suggestRecog = Object.entries(byOwner).sort((a,b)=>b[1]-a[1]).slice(0,3);

  $("#reviewTitle").textContent = `Weekly Review · ${fmtRange(s,e)}`;
  $("#reviewBody").innerHTML = `
    <div class="review-section">
      <div class="head"><div class="label">Done this week</div><div class="count">${completed.length}</div></div>
      <ul>
        ${completed.length ? completed.map(t=>`
          <li>
            <span class="name">${escapeHTML(t.title)}</span>
            <span class="muted" style="margin-left:auto">${escapeHTML(t.owner||'')} · ${fmtDate(t.completedAt)}</span>
          </li>`).join("") : `<li class="muted">Nothing logged yet this week.</li>`}
      </ul>
    </div>

    <div class="review-section">
      <div class="head"><div class="label">Overdue</div><div class="count" style="color:${overdue.length?'var(--danger)':'var(--ink)'}">${overdue.length}</div></div>
      <ul>
        ${overdue.length ? overdue.map(t=>`
          <li>
            <span class="name">${escapeHTML(t.title)}</span>
            <span class="muted" style="margin-left:auto">${escapeHTML(t.owner||'')} · due ${fmtDate(t.due)}</span>
          </li>`).join("") : `<li class="muted">Nothing overdue. 🌿</li>`}
      </ul>
    </div>

    <div class="review-section">
      <div class="head"><div class="label">Upcoming OOO · next 14 days</div><div class="count">${upcomingOOO.length}</div></div>
      <ul>
        ${upcomingOOO.length ? upcomingOOO.map(o=>`
          <li>
            <span class="name">${escapeHTML(o.name)}</span>
            <span class="muted">${escapeHTML(o.type||'')}</span>
            <span class="muted" style="margin-left:auto">${fmtDate(o.from)} – ${fmtDate(o.to)}</span>
          </li>`).join("") : `<li class="muted">Nobody scheduled to be out.</li>`}
      </ul>
    </div>

    <div class="review-section">
      <div class="head"><div class="label">Suggested recognitions</div><div class="count">${suggestRecog.length}</div></div>
      <ul>
        ${suggestRecog.length ? suggestRecog.map(([name,count])=>`
          <li>
            <span class="name">${escapeHTML(name)}</span>
            <span class="muted">${count} ${count===1?'task':'tasks'} done this week</span>
            <button class="btn" style="margin-left:auto" data-suggest="${escapeHTML(name)}">recognize</button>
          </li>`).join("") : `<li class="muted">No completed tasks to draw from.</li>`}
      </ul>
    </div>
  `;
  $$("[data-suggest]", $("#reviewBody")).forEach(b=>b.onclick=()=>{
    state.recognitions.unshift({ id:uid("r"), date:new Date().toISOString().slice(0,10), person:b.dataset.suggest, type:"effort", note:"Strong week — set the pace." });
    save(); toast("Recognition drafted"); $("#reviewModal").hidden=true; go("recognitions");
  });
  $("#reviewModal").hidden = false;
}

// ====================== EXCEL ======================
function exportXlsx(){
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([
    { key:"vision", value:state.strategy.vision },
    { key:"horizon", value:state.strategy.horizon },
    { key:"user.name", value:state.user.name },
    { key:"user.workspace", value:state.user.workspace }
  ]), "Strategy");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.priorities), "Priorities");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.strategy.pillars||[]), "Pillars");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.strategy.okrs||[]), "OKRs");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.initiatives), "Initiatives");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.tasks.map(t=>({...t,done:t.done?"yes":"no"}))), "Tasks");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.recognitions), "Recognitions");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.team.map(m=>({id:m.id,name:m.name,role:m.role,next1on1:m.next1on1}))), "Team");
  const ooo = state.team.flatMap(m=>(m.ooo||[]).map(o=>({memberId:m.id,name:m.name,from:o.from,to:o.to,type:o.type})));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(ooo), "OOO");
  const reqs = state.team.flatMap(m=>(m.requests||[]).map(r=>({memberId:m.id,name:m.name,id:r.id,title:r.title,status:r.status})));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(reqs), "Requests");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `command-center-${stamp}.xlsx`);
  toast("Excel downloaded");
}
function readSheet(wb, name){ const ws=wb.Sheets[name]; if(!ws) return []; return XLSX.utils.sheet_to_json(ws,{defval:""}); }
function importXlsx(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const wb = XLSX.read(e.target.result, { type:"array" });
      const strategyRows = readSheet(wb,"Strategy");
      const get = k => strategyRows.find(r=>r.key===k)?.value;
      const vision = get("vision") || state.strategy.vision;
      const horizon = get("horizon") || state.strategy.horizon;
      const userName = get("user.name") || state.user.name;
      const userWs = get("user.workspace") || state.user.workspace;
      const pillars = readSheet(wb,"Pillars");
      const okrs = readSheet(wb,"OKRs").map(o=>({...o, progress: parseFloat(o.progress)||0 }));
      const priorities = readSheet(wb,"Priorities");
      const initiatives = readSheet(wb,"Initiatives").map(i=>({...i, progress: parseFloat(i.progress)||0, due:String(i.due||"") }));
      const tasks = readSheet(wb,"Tasks").map(t=>({ id:t.id||uid("t"), title:t.title, horizon:t.horizon, initiative:t.initiative||null, owner:t.owner||"", due:String(t.due||""), done: t.done===true || /^(yes|true|1|x)$/i.test(String(t.done||"")) }));
      const recognitions = readSheet(wb,"Recognitions").map(r=>({...r, date:String(r.date||"")}));
      const teamRows = readSheet(wb,"Team");
      const oooRows = readSheet(wb,"OOO");
      const reqRows = readSheet(wb,"Requests");
      const team = teamRows.map(m=>({
        id:m.id||uid("m"), name:m.name, role:m.role, next1on1:String(m.next1on1||""),
        ooo: oooRows.filter(o=>o.memberId===m.id).map(o=>({from:String(o.from||""),to:String(o.to||""),type:o.type||"vacation"})),
        requests: reqRows.filter(r=>r.memberId===m.id).map(r=>({id:r.id||uid("q"),title:r.title,status:r.status||"pending"}))
      }));
      state = {
        user:{ name:userName, workspace:userWs },
        priorities,
        strategy:{ vision, horizon, pillars, okrs },
        initiatives, tasks, recognitions, team
      };
      save(); render(); toast("Imported from Excel");
    } catch(err){
      alert("Could not import: " + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ====================== BOOT ======================
$("#today").textContent = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
$("#kTrigger").onclick = openCapture;
$$("[data-close]").forEach(b=>b.onclick=()=>{ $("#"+b.dataset.close).hidden=true; });
$$("#captureType button").forEach(b=>b.onclick=()=>{
  captureType=b.dataset.type;
  $$("#captureType button").forEach(x=>x.classList.toggle("active",x===b));
  $("#captureMeta").style.display = captureType==="task" ? "" : "none";
});
$("#captureInput").addEventListener("input", refreshPalette);
$("#captureInput").addEventListener("keydown",e=>{
  if (e.key==="Enter"){ e.preventDefault(); commitCapture(); }
  else if (e.key==="Escape"){ closeCapture(); }
  else if (e.key==="ArrowDown" && searchHits.length){ e.preventDefault(); searchSelIdx=(searchSelIdx+1)%searchHits.length; updateSel(); }
  else if (e.key==="ArrowUp" && searchHits.length){ e.preventDefault(); searchSelIdx=(searchSelIdx-1+searchHits.length)%searchHits.length; updateSel(); }
});
$("#reviewBtn").onclick = openReview;
document.addEventListener("keydown",e=>{
  const inEdit = e.target.matches?.("input,textarea,[contenteditable='plaintext-only']");
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){ e.preventDefault(); openCapture(); }
  if (!inEdit && e.key.toLowerCase()==="r" && !e.metaKey && !e.ctrlKey && !e.altKey){
    if ($("#reviewModal").hidden && $("#captureModal").hidden && $("#formModal").hidden){
      e.preventDefault(); openReview();
    }
  }
  if(e.key==="Escape"){ $("#captureModal").hidden=true; $("#formModal").hidden=true; $("#reviewModal").hidden=true; closeDD(); }
});
$("#exportXlsx").onclick = exportXlsx;
$("#importXlsxBtn").onclick = ()=>$("#importXlsx").click();
$("#importXlsx").onchange = e=>{ const f=e.target.files[0]; if(f) importXlsx(f); e.target.value=""; };

render();
</script>
